<div class="card !p-0 overflow-hidden border-white/5 hover:border-amber/30 transition-all group/card shadow-2xl shadow-black/40 {{ 'opacity-40 grayscale pointer-events-none' if inv.quantity == 0 else '' }}" id="inventory-card-{{ inv.id }}">
    
    <!-- Header Media -->
    <div class="relative h-44 bg-navy-accent/50 p-6 flex items-center justify-center border-b border-white/5 overflow-hidden">
        <img src="{{ inv.product.imagen_url }}" alt="{{ inv.product.name }}" 
             class="max-h-full object-contain drop-shadow-2xl transition-transform duration-500 group-hover/card:scale-110">
        
        <!-- Location Tag -->
        <div class="absolute top-4 left-4">
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-navy-deep/80 backdrop-blur-md border border-white/10 shadow-lg">
                <svg class="w-3.5 h-3.5 text-amber" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                <span class="text-[10px] font-black text-white uppercase tracking-widest truncate max-w-[100px]">{{ inv.building.name }}</span>
            </div>
        </div>

        <!-- Stock Indicator -->
        <div class="absolute top-4 right-4 animate-in fade-in zoom-in duration-700">
            <div class="flex items-center gap-2 px-4 py-1.5 rounded-xl bg-amber text-navy-deep font-black shadow-xl shadow-amber/20 border border-amber/40">
                <span class="text-[9px] uppercase tracking-tighter">DISPONIBLE</span>
                <span class="text-base leading-none">{{ inv.quantity }}</span>
            </div>
        </div>
        
        <div class="absolute inset-0 bg-gradient-to-t from-navy-deep/40 to-transparent"></div>
    </div>
    
    <!-- Body Content -->
    <div class="p-6 flex flex-col flex-grow bg-white/[0.01]">
        <div class="flex-grow space-y-1">
            <h3 class="text-sm font-black text-white uppercase tracking-tight leading-tight line-clamp-2 min-h-[2.5rem] group-hover/card:text-amber transition-colors">{{ inv.product.name }}</h3>
            {% if inv.product.sku %}
            <p class="text-[10px] font-black text-text-muted tracking-[0.2em] uppercase">{{ inv.product.sku }}</p>
            {% endif %}
        </div>
        
        <!-- Action Sector -->
        <div class="mt-6 pt-5 border-t border-white/5 space-y-4">
            <!-- Consumption Action -->
            <div class="flex items-center gap-2 group/action">
                <input type="number" id="qty-{{ inv.id }}" min="1" max="{{ inv.quantity }}" value="1" 
                       class="w-16 h-10 px-2 bg-white/5 border border-white/10 rounded-xl text-center font-black text-amber outline-none focus:border-amber/40 focus:bg-white/10 transition-all shadow-inner">
                
                <button hx-post="{{ url_for('orders.consume_inventory', inventory_id=inv.id) }}"
                        hx-vals="javascript:{quantity: document.getElementById('qty-{{ inv.id }}').value}"
                        hx-target="#inventory-card-{{ inv.id }}"
                        hx-swap="outerHTML"
                        class="flex-1 h-10 flex items-center justify-center gap-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all border
                               {% if inv.quantity > 0 %}
                               bg-red-500/5 text-red-400 border-red-500/20 hover:bg-red-500 hover:text-white hover:border-red-500 shadow-xl shadow-red-500/5
                               {% else %}
                               bg-white/5 text-white/20 border-white/5 cursor-not-allowed
                               {% endif %}"
                        {% if inv.quantity == 0 %}disabled{% endif %}>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M20 12H4"/></svg>
                    REGISTRAR CONSUMO
                </button>
            </div>
            
            <!-- Manual Addition Action -->
            <div class="pt-2 border-t border-white/[0.03]">
                <form action="{{ url_for('orders.adjust_stock', inventory_id=inv.id) }}" method="POST" class="flex items-center gap-2">
                    <input type="hidden" name="action" value="add">
                    <input type="number" name="quantity" min="1" value="1" 
                           class="w-16 h-8 px-2 bg-white/5 border border-white/5 rounded-lg text-center font-black text-emerald-400/60 outline-none focus:border-emerald-500/40 focus:bg-white/10 transition-all shadow-inner text-[11px]">
                    
                    <button type="submit" class="flex-1 h-8 flex items-center justify-center gap-2 rounded-lg font-black text-[9px] uppercase tracking-widest transition-all border bg-emerald-500/5 text-emerald-400 border-emerald-500/10 hover:bg-emerald-500 hover:text-white hover:border-emerald-500">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
                        REPOSICIÓN DIRECTA
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
