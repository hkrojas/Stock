<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Control | Acceso Institucional</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#0B1F33', accent: '#06286F', deep: '#041120' },
                        amber: { DEFAULT: '#F2AD3D', hover: '#D9921E', soft: '#C8A66B' },
                        text: { primary: '#ffffff', secondary: 'rgba(248, 245, 239, 0.75)', muted: 'rgba(248, 245, 239, 0.5)' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Manrope', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .input-field { 
                @apply w-full px-5 py-[0.875rem] border border-white/10 rounded-xl outline-none text-white text-sm font-medium transition-all placeholder:text-text-muted/30 font-sans;
                background: rgba(255, 255, 255, 0.04);
            }
            .input-field:focus {
                @apply border-amber/40 bg-white/[0.07] ring-4 ring-amber/5;
            }
            /* Autofill Overrides */
            input:-webkit-autofill,
            input:-webkit-autofill:hover, 
            input:-webkit-autofill:focus, 
            input:-webkit-autofill:active {
                -webkit-box-shadow: 0 0 0 1000px #0B1F33 inset !important;
                -webkit-text-fill-color: white !important;
                transition: background-color 5000s ease-in-out 0s;
            }
            .btn-primary { 
                @apply w-full py-4 px-6 rounded-xl text-[11px] font-black text-navy-deep bg-amber hover:bg-amber-hover transition-all shadow-xl shadow-amber/20 uppercase tracking-[0.15em] active:scale-[0.98];
            }
            .label-premium {
                @apply block text-text-muted text-[9px] font-black tracking-[0.25em] uppercase mb-3 ml-1 font-display;
            }
        }
    </style>
</head>
<body class="h-screen overflow-hidden bg-[#041120] flex items-center justify-center px-6 py-6 selection:bg-amber/30 selection:text-navy-deep">

    <div class="w-full max-w-sm animate-in fade-in zoom-in duration-700">

        <!-- Logo / Brand -->
        <div class="text-center mb-5 flex flex-col items-center group">
            <span class="flex h-20 w-20 items-center justify-center mb-4 rounded-full border border-white/10 bg-white/[0.03] shadow-2xl transition-transform group-hover:scale-105 duration-500">
                <img src="{{ url_for('static', filename='img/logo_trans.png') }}" alt="Grupo Hernández" class="h-12 w-12 object-contain drop-shadow-2xl">
            </span>
            <h1 class="text-2xl font-display font-black text-white tracking-[-0.05em] leading-none mb-1 uppercase">Grupo Hernández</h1>
            <div class="flex items-center gap-3">
                <div class="h-px w-8 bg-amber/30"></div>
                <p class="text-[0.65rem] font-black text-amber uppercase tracking-[0.3em]">Gestión de Inventario</p>
                <div class="h-px w-8 bg-amber/30"></div>
            </div>
        </div>

        <!-- Login Card -->
        <div class="relative group">
            <!-- Decorative Glow -->
            <div class="absolute -inset-1 bg-gradient-to-r from-amber/20 to-transparent rounded-[2.5rem] blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
            
            <div class="relative bg-navy-accent/20 backdrop-blur-3xl rounded-[2.5rem] border border-white/10 overflow-hidden shadow-2xl">

                <!-- Card Header -->
                <div class="px-8 pt-8 pb-2">
                    <h2 class="text-xl font-black text-white uppercase tracking-tight">Acceso Institucional</h2>
                    <p class="text-[10px] font-medium text-text-muted mt-2 uppercase tracking-widest">Ingrese sus credenciales de servicio</p>
                </div>

                <!-- Flash Messages (SweetAlert2 Toasts) -->
                <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <script>
                    const Toast = Swal.mixin({
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 4000,
                        timerProgressBar: true,
                        background: '#0B1F33',
                        color: '#fff',
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });

                    {% for category, message in messages %}
                        {% set icon = 'success' %}
                        {% if category == 'error' %} {% set icon = 'error' %}
                        {% elif category == 'info' %} {% set icon = 'info' %}
                        {% elif category == 'warning' %} {% set icon = 'warning' %}
                        {% endif %}
                        Toast.fire({
                            icon: '{{ icon }}',
                            title: '{{ message|replace("'", "\\'") }}'
                        });
                    {% endfor %}
                </script>
                {% endif %}
                {% endwith %}

                <!-- Form -->
                <form method="POST" action="{{ url_for('auth.login') }}" class="px-8 py-6 space-y-5">

                    <!-- Username -->
                    <div class="space-y-1">
                        <label class="label-premium">Identificador Único</label>
                        <div class="relative group/input">
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none z-10 transition-colors group-focus-within/input:text-amber">
                                <svg class="w-4 h-4 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <input type="text" id="username" name="username" required autocomplete="username"
                                   placeholder="Nombre de Usuario"
                                   class="input-field !pl-14 !bg-white/[0.05] !text-white">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="space-y-1">
                        <label class="label-premium">Clave de Seguridad</label>
                        <div class="relative group/input">
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none z-10 transition-colors group-focus-within/input:text-amber">
                                <svg class="w-4 h-4 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            </div>
                            <input type="password" id="password" name="password" required autocomplete="current-password"
                                   placeholder="Password Institucional"
                                   class="input-field !pl-14 !pr-14 !bg-white/[0.05] !text-white">
                            <button type="button" id="toggle-password"
                                    onclick="togglePassword()"
                                    class="absolute inset-y-0 right-0 pr-5 flex items-center text-white/30 hover:text-amber transition-colors z-10">
                                <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                                <svg id="eye-off-icon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <script>
                        function togglePassword() {
                            const input = document.getElementById('password');
                            const eyeOn = document.getElementById('eye-icon');
                            const eyeOff = document.getElementById('eye-off-icon');
                            const isHidden = input.type === 'password';
                            input.type = isHidden ? 'text' : 'password';
                            eyeOn.classList.toggle('hidden', isHidden);
                            eyeOff.classList.toggle('hidden', !isHidden);
                        }
                    </script>

                    <!-- Remember me -->
                    <div class="flex items-center justify-between pl-1">
                        <label class="flex items-center cursor-pointer group/check">
                            <input id="remember" name="remember" type="checkbox" class="peer hidden">
                            <div class="w-5 h-5 rounded-lg border-2 border-white/10 bg-white/5 flex items-center justify-center transition-all peer-checked:bg-amber peer-checked:border-amber group-hover/check:border-white/20">
                                <svg class="w-3 h-3 text-navy-deep opacity-0 peer-checked:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"/></svg>
                            </div>
                            <span class="ml-3 text-[10px] font-bold text-text-muted uppercase tracking-widest group-hover/check:text-white transition-colors">Recordar sesión</span>
                        </label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn-primary mt-2">
                        Entrar al Sistema
                    </button>
                </form>

                <!-- Footer hint -->
                <div class="px-8 pb-6 text-center">
                    <p class="text-[9px] text-white/20 font-black uppercase tracking-[0.2em]">Acceso Restringido • Grupo Hernández S.A.C.</p>
                </div>
            </div>
        </div>

        <!-- Version Info -->
        <div class="mt-6 flex flex-col items-center gap-2 opacity-30">
            <p class="text-[10px] font-black text-white uppercase tracking-[0.4em]">v4.0.1 • Production Ready</p>
            <div class="h-1 w-1 rounded-full bg-amber"></div>
        </div>
    </div>

</body>
</html>
