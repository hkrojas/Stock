{% extends 'base.html' %}
{% block title %}Nuevo Producto{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto space-y-6 pb-10">
    <div class="flex items-center gap-3">
        <a href="{{ url_for('catalog.warehouse') }}" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        </a>
        <div>
            <h2 class="text-xl font-extrabold text-[#00205B]">Nuevo Producto</h2>
            <p class="text-sm text-slate-400 font-medium">Registra un nuevo producto en el almacén local.</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 overflow-hidden">
        <form method="POST" action="{{ url_for('catalog.create_product') }}" enctype="multipart/form-data" class="p-6 space-y-4">
            <div>
                <label for="name" class="block text-sm font-bold text-slate-700 mb-1.5">Nombre <span class="text-red-400">*</span></label>
                <input type="text" id="name" name="name" required placeholder="Ej: Jabón Líquido 5L" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="sku" class="block text-sm font-bold text-slate-700 mb-1.5">SKU</label>
                    <input type="text" id="sku" name="sku" placeholder="Opcional" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label for="unit" class="block text-sm font-bold text-slate-700 mb-1.5">Unidad</label>
                    <input type="text" id="unit" name="unit" placeholder="Ej: Galón" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label for="precio" class="block text-sm font-bold text-slate-700 mb-1.5">Precio (S/)</label>
                    <input type="number" step="0.01" id="precio" name="precio" value="0.00" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label for="stock_actual" class="block text-sm font-bold text-slate-700 mb-1.5">Stock Inicial</label>
                    <input type="number" id="stock_actual" name="stock_actual" value="0" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
            </div>
            <div>
                <label for="description" class="block text-sm font-bold text-slate-700 mb-1.5">Descripción</label>
                <textarea id="description" name="description" rows="2" placeholder="Detalles del producto" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
            </div>
            <div>
                <label for="image" class="block text-sm font-bold text-slate-700 mb-1.5">Foto del Producto <span class="text-slate-400 font-normal">(opcional)</span></label>
                <input type="file" id="image" name="image" accept="image/*" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm font-medium text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all">
            </div>
            <div class="pt-2 flex gap-3">
                <a href="{{ url_for('catalog.warehouse') }}" class="flex-1 text-center py-3 rounded-xl text-sm font-bold text-slate-500 bg-slate-100 hover:bg-slate-200">Cancelar</a>
                <button type="submit" class="flex-1 py-3 rounded-xl text-sm font-extrabold text-[#00205B] shadow-md bg-[#FAAC2A] hover:bg-[#E5981D]">Registrar Producto</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
