<div class="bg-white rounded-3xl shadow-lg shadow-slate-200/50 border border-slate-200/80 overflow-hidden flex flex-col hover:border-[#FAAC2A]/50 transition-colors {{ 'opacity-60 grayscale' if inv.quantity == 0 else '' }}" id="inventory-card-{{ inv.id }}">
    <!-- Image -->
    <div class="relative h-48 bg-slate-50 p-4 flex items-center justify-center border-b border-slate-100">
        <img src="{{ inv.product.imagen_url }}" alt="{{ inv.product.name }}" class="max-h-full object-contain mix-blend-multiply transition-transform duration-300 hover:scale-105">
        
        <div class="absolute top-3 left-3 flex flex-col gap-1.5">
            <div class="bg-white/90 backdrop-blur-sm text-[#00205B] text-[10px] font-bold px-2.5 py-1 rounded-full border border-slate-200/50 shadow-sm flex items-center gap-1">
                <svg class="w-3 h-3 text-[#FAAC2A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                <span class="truncate max-w-[120px]">{{ inv.building.name }}</span>
            </div>
        </div>

        <!-- Stock Badge overlay -->
        <div class="absolute top-3 right-3 bg-[#00205B] text-white text-xs font-bold px-3 py-1 rounded-full shadow-md flex items-center gap-1 border border-blue-800">
            Stock: <span class="{{ 'text-rose-400' if inv.quantity == 0 else 'text-[#FAAC2A]' }} text-sm font-black">{{ inv.quantity }}</span>
        </div>
    </div>
    
    <!-- Content -->
    <div class="p-5 flex flex-col flex-grow">
        <div class="flex-grow">
            <h3 class="text-base font-extrabold text-[#00205B] leading-tight mb-1 line-clamp-2">{{ inv.product.name }}</h3>
            {% if inv.product.sku %}
            <p class="text-xs font-bold text-slate-400 mb-3">{{ inv.product.sku }}</p>
            {% endif %}
        </div>
        
        <!-- Action -->
        <div class="mt-4 pt-4 border-t border-slate-100">
            <button hx-post="{{ url_for('orders.consume_inventory', inventory_id=inv.id) }}"
                    hx-target="#inventory-card-{{ inv.id }}"
                    hx-swap="outerHTML"
                    class="w-full flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all {% if inv.quantity > 0 %}bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white border border-rose-200 hover:border-rose-600{% else %}bg-slate-100 text-slate-400 cursor-not-allowed{% endif %}"
                    {% if inv.quantity == 0 %}disabled{% endif %}>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>
                Reportar Consumo (-1)
            </button>
        </div>
    </div>
</div>
